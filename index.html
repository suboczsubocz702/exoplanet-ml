<!DOCTYPE html>
<html>
<head>
    <title>Exoplanet Predictor</title>
</head>
<body>

<h1>Exoplanet Classifier</h1>

<input id="snr" placeholder="SNR"><br>
<input id="depth" placeholder="Depth"><br>
<input id="duration" placeholder="Duration"><br>
<input id="prad" placeholder="Planet radius"><br>
<input id="period" placeholder="Period"><br>
<input id="impact" placeholder="Impact"><br>

<button onclick="predict()">Predict</button>

<h2 id="result"></h2>

<script>
async function predict() {

    const data = {
        snr: parseFloat(document.getElementById("snr").value),
        depth: parseFloat(document.getElementById("depth").value),
        duration: parseFloat(document.getElementById("duration").value),
        prad: parseFloat(document.getElementById("prad").value),
        period: parseFloat(document.getElementById("period").value),
        impact: parseFloat(document.getElementById("impact").value)
    };

    const response = await fetch("https://exoplanet-ml.onrender.com/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await response.json();

    document.getElementById("result").innerText =
        "Probability: " + result.probability.toFixed(3);
}
</script>

</body>
</html>
