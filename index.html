<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exoplanet Classifier</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    background: #111827;
    padding: 30px;
    border-radius: 16px;
    width: 350px;
    box-shadow: 0 0 30px rgba(0,0,0,0.6);
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 8px;
    border: none;
    background: #1f2937;
    color: white;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: #3b82f6;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

.result {
    margin-top: 20px;
    text-align: center;
    font-size: 18px;
}

.good {
    color: #22c55e;
}

.bad {
    color: #ef4444;
}

.loading {
    opacity: 0.6;
}
</style>
</head>

<body>

<div class="container">
    <h1>Exoplanet AI</h1>

    <input id="snr" placeholder="SNR">
    <input id="depth" placeholder="Depth">
    <input id="duration" placeholder="Duration">
    <input id="prad" placeholder="Planet radius">
    <input id="period" placeholder="Period">
    <input id="impact" placeholder="Impact">

    <button onclick="predict()">Predict</button>

    <div id="result" class="result"></div>
</div>

<script>
async function predict() {

    const resultBox = document.getElementById("result");
    resultBox.innerText = " Predicting...";
    resultBox.classList.add("loading");

    const data = {
        snr: parseFloat(document.getElementById("snr").value),
        depth: parseFloat(document.getElementById("depth").value),
        duration: parseFloat(document.getElementById("duration").value),
        prad: parseFloat(document.getElementById("prad").value),
        period: parseFloat(document.getElementById("period").value),
        impact: parseFloat(document.getElementById("impact").value)
    };

    try {
        const response = await fetch("https://exoplanet-ml.onrender.com/predict", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        });

        const result = await response.json();

        resultBox.classList.remove("loading");

        if (result.prediction === 1) {
            resultBox.innerHTML =
                `<span class="good">Exoplanet</span><br>
                 Probability: ${result.probability.toFixed(3)}`;
        } else {
            resultBox.innerHTML =
                `<span class="bad">False Positive</span><br>
                 Probability: ${result.probability.toFixed(3)}`;
        }

    } catch (err) {
        resultBox.innerText = "Error connecting to API";
    }
}
</script>

</body>
</html>
